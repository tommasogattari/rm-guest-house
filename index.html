<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>House — Room Management</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F5F2EC;
    --surface: #FFFFFF;
    --surface2: #EDE9E0;
    --text: #1C1A16;
    --text2: #6B6760;
    --text3: #A09D97;
    --border: #D8D3C8;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
    --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);

    --green: #3D7A4F;
    --green-bg: #D4EDDA;
    --green-light: #EAF5EE;
    --red: #B84040;
    --red-bg: #F5D4D4;
    --red-light: #FBF0F0;
    --violet: #6B4FA0;
    --violet-bg: #E2D5F5;
    --violet-light: #F2ECFB;
    --brown: #7A5C38;
    --brown-bg: #EAD9C0;
    --brown-light: #F5EEE3;
    --pink: #C0557A;
    --pink-bg: #F5D5E2;
    --pink-light: #FCF0F5;
    --blue: #2E6FA3;
    --blue-bg: #D0E6F5;
    --blue-light: #EAF4FD;
    --gray: #5A5A5A;
    --gray-bg: #E0E0E0;
    --gray-light: #F0F0F0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: var(--shadow);
  }

  .logo { font-family: 'DM Serif Display', serif; font-size: 22px; color: var(--text); letter-spacing: -0.3px; }
  .logo span { color: var(--brown); }

  .date-display {
    font-size: 13px;
    color: var(--text2);
    background: var(--surface2);
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
  }

  .container { max-width: 1100px; margin: 0 auto; padding: 32px 24px; }

  .legend {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px 20px;
    margin-bottom: 28px;
    display: flex;
    flex-wrap: wrap;
    gap: 10px 20px;
    align-items: center;
  }

  .legend-title { font-size: 11px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--text3); margin-right: 4px; }

  .legend-item { display: flex; align-items: center; gap: 7px; font-size: 12px; color: var(--text2); }

  .legend-dot { width: 14px; height: 14px; border-radius: 4px; flex-shrink: 0; }

  .floor-section { margin-bottom: 36px; }

  .floor-header { display: flex; align-items: center; gap: 14px; margin-bottom: 18px; }

  .floor-title { font-family: 'DM Serif Display', serif; font-size: 20px; color: var(--text); }

  .floor-badge {
    font-size: 11px; font-weight: 600; letter-spacing: 0.5px; color: var(--text2);
    background: var(--surface2); border: 1px solid var(--border); padding: 3px 10px; border-radius: 20px;
  }

  .floor-stats { margin-left: auto; display: flex; gap: 12px; }

  .stat-pill { font-size: 11px; font-weight: 500; padding: 3px 10px; border-radius: 20px; border: 1px solid; }

  .rooms-grid { display: flex; flex-wrap: wrap; gap: 10px; }

  .room-card {
    border-radius: 12px;
    border: 1.5px solid transparent;
    cursor: pointer;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    position: relative;
    overflow: hidden;
    padding: 12px 14px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    width: 150px;
  }

  .room-card.emergency { width: 108px; padding: 10px 12px; }
  .room-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }

  .room-card.green  { background: var(--green-light);  border-color: var(--green); }
  .room-card.red    { background: var(--red-light);    border-color: var(--red); }
  .room-card.violet { background: var(--violet-light); border-color: var(--violet); }
  .room-card.brown  { background: var(--brown-light);  border-color: var(--brown); }
  .room-card.pink   { background: var(--pink-light);   border-color: var(--pink); }
  .room-card.pink.temp-guest { border-style: dashed; }
  .room-card.blue   { background: var(--blue-light);   border-color: var(--blue); }
  .room-card.gray   { background: var(--gray-light);   border-color: var(--gray); }

  .room-number { font-family: 'DM Serif Display', serif; font-size: 20px; line-height: 1; }

  .room-card.green  .room-number { color: var(--green); }
  .room-card.red    .room-number { color: var(--red); }
  .room-card.violet .room-number { color: var(--violet); }
  .room-card.brown  .room-number { color: var(--brown); }
  .room-card.pink   .room-number { color: var(--pink); }
  .room-card.blue   .room-number { color: var(--blue); }
  .room-card.gray   .room-number { color: var(--gray); }

  .room-type-label { font-size: 10px; font-weight: 600; letter-spacing: 0.6px; text-transform: uppercase; opacity: 0.65; }

  .room-card.green  .room-type-label { color: var(--green); }
  .room-card.red    .room-type-label { color: var(--red); }
  .room-card.violet .room-type-label { color: var(--violet); }
  .room-card.brown  .room-type-label { color: var(--brown); }
  .room-card.pink   .room-type-label { color: var(--pink); }
  .room-card.blue   .room-type-label { color: var(--blue); }
  .room-card.gray   .room-type-label { color: var(--gray); }

  .room-name {
    font-size: 12px; font-weight: 500; color: var(--text);
    margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  .room-owner-hint {
    font-size: 10px; color: var(--pink); font-style: italic;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; opacity: 0.8;
  }

  .room-dates { font-size: 10px; color: var(--text3); margin-top: 1px; }

  .timer-badge {
    position: absolute; top: 8px; right: 8px;
    font-size: 9px; font-weight: 600;
    background: rgba(255,255,255,0.85); color: var(--violet);
    border: 1px solid var(--violet); padding: 2px 5px; border-radius: 6px;
  }

  .status-dot {
    position: absolute; bottom: 9px; right: 10px;
    width: 8px; height: 8px; border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,0.7);
  }

  .room-card.green  .status-dot { background: var(--green); }
  .room-card.red    .status-dot { background: var(--red); }
  .room-card.violet .status-dot { background: var(--violet); }
  .room-card.brown  .status-dot { background: var(--brown); }
  .room-card.pink   .status-dot { background: var(--pink); }
  .room-card.blue   .status-dot { background: var(--blue); }
  .room-card.gray   .status-dot { background: var(--gray); }

  /* MODAL */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(28,26,22,0.5); z-index: 200;
    align-items: center; justify-content: center; padding: 20px;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface); border-radius: 20px;
    width: 100%; max-width: 490px;
    box-shadow: var(--shadow-lg); overflow: hidden;
    animation: slideUp 0.2s ease;
  }

  @keyframes slideUp {
    from { transform: translateY(20px); opacity: 0; }
    to   { transform: translateY(0);    opacity: 1; }
  }

  .modal-header {
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: flex-start; gap: 14px;
  }

  .modal-color-badge {
    width: 44px; height: 44px; border-radius: 12px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-family: 'DM Serif Display', serif; font-size: 18px;
  }

  .modal-title { font-family: 'DM Serif Display', serif; font-size: 18px; }
  .modal-subtitle { font-size: 12px; color: var(--text2); margin-top: 2px; }

  .modal-body { padding: 20px 24px; display: flex; flex-direction: column; gap: 14px; }

  .field-group { display: flex; flex-direction: column; gap: 5px; }

  .field-label { font-size: 11px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; color: var(--text2); }

  .field-input {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; padding: 9px 12px;
    font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--text);
    outline: none; transition: border-color 0.15s; width: 100%;
  }
  .field-input:focus { border-color: var(--brown); }

  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .status-buttons { display: flex; gap: 8px; flex-wrap: wrap; }

  .status-btn {
    font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500;
    padding: 7px 13px; border-radius: 8px;
    border: 1.5px solid var(--border); cursor: pointer;
    transition: all 0.15s; background: transparent; color: var(--text2);
  }

  .status-btn.active.s-green  { background: var(--green-bg);  color: var(--green);  border-color: var(--green);  font-weight: 600; }
  .status-btn.active.s-red    { background: var(--red-bg);    color: var(--red);    border-color: var(--red);    font-weight: 600; }
  .status-btn.active.s-violet { background: var(--violet-bg); color: var(--violet); border-color: var(--violet); font-weight: 600; }

  /* Restore owner section */
  .restore-section {
    background: var(--pink-light);
    border: 1.5px solid var(--pink);
    border-radius: 10px;
    padding: 12px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .restore-label { font-size: 12px; color: var(--pink); }
  .restore-label strong { font-weight: 600; }

  .restore-btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px; font-weight: 600;
    padding: 7px 14px; border-radius: 8px;
    border: 1.5px solid var(--pink);
    background: var(--pink); color: white;
    cursor: pointer; transition: all 0.15s;
    white-space: nowrap; flex-shrink: 0;
  }
  .restore-btn:hover { background: #a8446a; border-color: #a8446a; }

  .modal-footer {
    padding: 16px 24px; border-top: 1px solid var(--border);
    display: flex; gap: 10px; justify-content: flex-end;
  }

  .btn {
    font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500;
    padding: 9px 18px; border-radius: 9px; border: 1px solid var(--border);
    cursor: pointer; transition: all 0.15s;
  }
  .btn-cancel { background: transparent; color: var(--text2); }
  .btn-cancel:hover { background: var(--surface2); }
  .btn-save { background: var(--text); color: white; border-color: var(--text); }
  .btn-save:hover { background: #2d2b25; }

  .info-note {
    font-size: 11px; color: var(--text3);
    background: var(--surface2); border-radius: 8px;
    padding: 8px 11px; border: 1px solid var(--border); line-height: 1.5;
  }

  .toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--text); color: white;
    padding: 12px 20px; border-radius: 12px;
    font-size: 13px; font-weight: 500;
    box-shadow: var(--shadow-lg); z-index: 999;
    transform: translateY(80px); opacity: 0;
    transition: all 0.25s ease;
  }
  .toast.show { transform: translateY(0); opacity: 1; }

  @media (max-width: 600px) {
    .container { padding: 20px 16px; }
    .room-card { width: 130px; }
    .room-card.emergency { width: 95px; }
    header { padding: 0 16px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">Guest <span>House</span></div>
  <div class="date-display" id="date-display"></div>
</header>

<div class="container">

  <div class="legend">
    <span class="legend-title">Legend</span>
    <div class="legend-item"><div class="legend-dot" style="background:var(--green-light);border:1.5px solid var(--green)"></div> Available</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--red-light);border:1.5px solid var(--red)"></div> Occupied</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--violet-light);border:1.5px solid var(--violet)"></div> Needs cleaning</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--brown-light);border:1.5px solid var(--brown)"></div> Fixed (seminarians/students)</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--pink-light);border:1.5px solid var(--pink)"></div> Priest (owner)</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--pink-light);border:1.5px dashed var(--pink)"></div> Priest room (temp. guest)</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--blue-light);border:1.5px solid var(--blue)"></div> Annual itinerancy</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--gray-light);border:1.5px solid var(--gray)"></div> Fixed resident</div>
  </div>

  <div class="floor-section">
    <div class="floor-header">
      <div class="floor-title">First Floor</div>
      <div class="floor-badge">7 rooms</div>
      <div class="floor-stats" id="stats-f1"></div>
    </div>
    <div class="rooms-grid" id="grid-f1"></div>
  </div>

  <div class="floor-section">
    <div class="floor-header">
      <div class="floor-title">Second Floor</div>
      <div class="floor-badge">15 rooms</div>
      <div class="floor-stats" id="stats-f2"></div>
    </div>
    <div class="rooms-grid" id="grid-f2"></div>
  </div>

</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-color-badge" id="m-badge"></div>
      <div>
        <div class="modal-title" id="m-title"></div>
        <div class="modal-subtitle" id="m-subtitle"></div>
      </div>
    </div>
    <div class="modal-body">

      <div class="field-group" id="status-group">
        <div class="field-label">Status</div>
        <div class="status-buttons">
          <button class="status-btn s-green"  onclick="setStatus('green')"  id="btn-green">✓ Available</button>
          <button class="status-btn s-red"    onclick="setStatus('red')"    id="btn-red">● Occupied</button>
          <button class="status-btn s-violet" onclick="setStatus('violet')" id="btn-violet">✦ Needs cleaning</button>
        </div>
      </div>

      <!-- Restore owner (priest rooms) -->
      <div class="restore-section" id="restore-group" style="display:none">
        <div class="restore-label">Permanent occupant: <strong id="restore-owner-name"></strong></div>
        <button class="restore-btn" onclick="restoreOwner()">↩ Restore owner</button>
      </div>

      <div class="field-group" id="guest-group">
        <div class="field-label">Occupant name</div>
        <input class="field-input" id="m-guest" type="text" placeholder="First and last name...">
      </div>

      <div class="field-row" id="dates-group">
        <div class="field-group">
          <div class="field-label">From</div>
          <input class="field-input" id="m-from" type="date">
        </div>
        <div class="field-group">
          <div class="field-label">To</div>
          <input class="field-input" id="m-to" type="date">
        </div>
      </div>

      <div class="field-group">
        <div class="field-label">Notes</div>
        <input class="field-input" id="m-notes" type="text" placeholder="Additional notes...">
      </div>

      <div class="info-note" id="m-info" style="display:none"></div>

    </div>
    <div class="modal-footer">
      <button class="btn btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn btn-save" onclick="saveRoom()">Save</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const TWO_WEEKS_MS = 14 * 24 * 60 * 60 * 1000;

const INITIAL_ROOMS = [
  // FIRST FLOOR
  { id:'f1-1',  floor:1, label:'1-A', fixedType:'Itinerancy', type:'blue',  fixedColor:true,  canEdit:['guest','dates','notes'],         occupant:'',          owner:null,         from:'', to:'', notes:'', greenSince:null },
  { id:'f1-2',  floor:1, label:'1-B', fixedType:'Itinerancy', type:'blue',  fixedColor:true,  canEdit:['guest','dates','notes'],         occupant:'',          owner:null,         from:'', to:'', notes:'', greenSince:null },
  { id:'f1-3',  floor:1, label:'1-C', fixedType:'Normal',     type:'green', fixedColor:false, canEdit:['status','guest','dates','notes'], occupant:'',          owner:null,         from:'', to:'', notes:'', greenSince:Date.now() },
  { id:'f1-4',  floor:1, label:'1-D', fixedType:'Normal',     type:'green', fixedColor:false, canEdit:['status','guest','dates','notes'], occupant:'',          owner:null,         from:'', to:'', notes:'', greenSince:Date.now() },
  { id:'f1-5',  floor:1, label:'1-E', fixedType:'Priest',     type:'pink',  fixedColor:true,  canEdit:['guest','dates','notes'],         occupant:'Fr. Mario', owner:'Fr. Mario',  from:'', to:'', notes:'', greenSince:null },
  { id:'f1-6',  floor:1, label:'1-F', fixedType:'Priest',     type:'pink',  fixedColor:true,  canEdit:['guest','dates','notes'],         occupant:'Fr. Luigi', owner:'Fr. Luigi',  from:'', to:'', notes:'', greenSince:null },
  { id:'f1-7',  floor:1, label:'1-G', fixedType:'Priest',     type:'pink',  fixedColor:true,  canEdit:['guest','dates','notes'],         occupant:'Fr. Carlo', owner:'Fr. Carlo',  from:'', to:'', notes:'', greenSince:null },

  // SECOND FLOOR
  { id:'f2-1',  floor:2, label:'2-A', fixedType:'Seminarian', type:'brown', fixedColor:true,  canEdit:['guest','notes'],                 occupant:'Seminarian 1',     owner:null, from:'', to:'', notes:'', greenSince:null },
  { id:'f2-2',  floor:2, label:'2-B', fixedType:'Seminarian', type:'brown', fixedColor:true,  canEdit:['guest','notes'],                 occupant:'Seminarian 2',     owner:null, from:'', to:'', notes:'', greenSince:null },
  { id:'f2-3',  floor:2, label:'2-C', fixedType:'Seminarian', type:'brown', fixedColor:true,  canEdit:['guest','notes'],                 occupant:'Seminarian 3',     owner:null, from:'', to:'', notes:'', greenSince:null },
  { id:'f2-4',  floor:2, label:'2-D', fixedType:'Seminarian', type:'brown', fixedColor:true,  canEdit:['guest','notes'],                 occupant:'Seminarian 4',     owner:null, from:'', to:'', notes:'', greenSince:null },
  { id:'f2-5',  floor:2, label:'2-E', fixedType:'Seminarian', type:'brown', fixedColor:true,  canEdit:['guest','notes'],                 occupant:'Seminarian 5',     owner:null, from:'', to:'', notes:'', greenSince:null },
  { id:'f2-6',  floor:2, label:'2-F', fixedType:'Seminarian', type:'brown', fixedColor:true,  canEdit:['guest','notes'],                 occupant:'Seminarian 6',     owner:null, from:'', to:'', notes:'', greenSince:null },
  { id:'f2-7',  floor:2, label:'2-G', fixedType:'Seminarian', type:'brown', fixedColor:true,  canEdit:['guest','notes'],                 occupant:'Seminarian 7',     owner:null, from:'', to:'', notes:'', greenSince:null },
  { id:'f2-8',  floor:2, label:'2-H', fixedType:'Student',    type:'brown', fixedColor:true,  canEdit:['guest','notes'],                 occupant:'Student 1',        owner:null, from:'', to:'', notes:'', greenSince:null },
  { id:'f2-9',  floor:2, label:'2-I', fixedType:'Student',    type:'brown', fixedColor:true,  canEdit:['guest','notes'],                 occupant:'Student 2',        owner:null, from:'', to:'', notes:'', greenSince:null },
  { id:'f2-10', floor:2, label:'2-L', fixedType:'Sem. Itin.', type:'pink',  fixedColor:true,  canEdit:['guest','notes'],                 occupant:'Sem. Itinerancy',  owner:'Sem. Itinerancy', from:'', to:'', notes:'', greenSince:null },
  { id:'f2-11', floor:2, label:'2-M', fixedType:'Normal',     type:'green', fixedColor:false, canEdit:['status','guest','dates','notes'], occupant:'',          owner:null, from:'', to:'', notes:'', greenSince:Date.now() },
  { id:'f2-12', floor:2, label:'2-N', fixedType:'Normal',     type:'green', fixedColor:false, canEdit:['status','guest','dates','notes'], occupant:'',          owner:null, from:'', to:'', notes:'', greenSince:Date.now() },
  { id:'f2-13', floor:2, label:'2-O', fixedType:'Emergency',  type:'green', fixedColor:false, canEdit:['status','guest','dates','notes'], emergency:true, occupant:'', owner:null, from:'', to:'', notes:'', greenSince:Date.now() },
  { id:'f2-14', floor:2, label:'2-P', fixedType:'Emergency',  type:'green', fixedColor:false, canEdit:['status','guest','dates','notes'], emergency:true, occupant:'', owner:null, from:'', to:'', notes:'', greenSince:Date.now() },
  { id:'f2-15', floor:2, label:'2-Q', fixedType:'Resident',   type:'gray',  fixedColor:true,  canEdit:['notes'],                         occupant:'Marco', owner:null, from:'', to:'', notes:'', greenSince:null },
];

// ── STATE ──────────────────────────────────────────────

function loadData() {
  try {
    const saved = localStorage.getItem('guesthouse_v3');
    if (saved) return JSON.parse(saved);
  } catch(e) {}
  return JSON.parse(JSON.stringify(INITIAL_ROOMS));
}

function saveData() { localStorage.setItem('guesthouse_v3', JSON.stringify(rooms)); }

let rooms = loadData();
let currentRoom = null;

// ── TIMER ──────────────────────────────────────────────

function checkTimers() {
  const now = Date.now(); let changed = false;
  rooms.forEach(r => {
    if (r.type === 'green' && r.greenSince && !r.fixedColor && (now - r.greenSince >= TWO_WEEKS_MS)) {
      r.type = 'violet'; r.greenSince = null; changed = true;
    }
  });
  if (changed) { saveData(); renderAll(); }
}

function daysLeft(r) {
  if (r.type !== 'green' || !r.greenSince || r.fixedColor) return null;
  const rem = TWO_WEEKS_MS - (Date.now() - r.greenSince);
  return rem <= 0 ? 0 : Math.ceil(rem / 86400000);
}

// ── HELPERS ────────────────────────────────────────────

function colorBg(t)   { return ({green:'var(--green-bg)',red:'var(--red-bg)',violet:'var(--violet-bg)',brown:'var(--brown-bg)',pink:'var(--pink-bg)',blue:'var(--blue-bg)',gray:'var(--gray-bg)'})[t]||'#eee'; }
function colorText(t) { return ({green:'var(--green)',   red:'var(--red)',   violet:'var(--violet)',   brown:'var(--brown)',   pink:'var(--pink)',   blue:'var(--blue)',   gray:'var(--gray)'  })[t]||'#666'; }

function isPriestRoom(r) { return r.fixedType === 'Priest' || r.fixedType === 'Sem. Itin.'; }
function hasTempGuest(r) { return isPriestRoom(r) && r.owner && r.occupant !== r.owner; }

function fmtDate(s) {
  if (!s) return '';
  return new Date(s).toLocaleDateString('en-GB', { day:'2-digit', month:'2-digit' });
}

// ── RENDER ─────────────────────────────────────────────

function renderRoom(r) {
  const card = document.createElement('div');
  const tempGuest = hasTempGuest(r);
  card.className = `room-card ${r.type}${r.emergency?' emergency':''}${tempGuest?' temp-guest':''}`;
  card.onclick = () => openModal(r.id);

  const dl = daysLeft(r);
  const timerHtml = (dl !== null && dl <= 7) ? `<div class="timer-badge">${dl}d</div>` : '';
  const nameDisplay = r.occupant || (r.type === 'green' ? 'Available' : '—');
  const datesDisplay = (r.from && r.to) ? `${fmtDate(r.from)} → ${fmtDate(r.to)}` : (r.from ? `From ${fmtDate(r.from)}` : '');
  const ownerHint = tempGuest ? `<div class="room-owner-hint">owner: ${r.owner}</div>` : '';

  card.innerHTML = `
    ${timerHtml}
    <div class="room-number">${r.label}</div>
    <div class="room-type-label">${r.fixedType}</div>
    <div class="room-name">${nameDisplay}</div>
    ${ownerHint}
    ${datesDisplay ? `<div class="room-dates">${datesDisplay}</div>` : ''}
    <div class="status-dot"></div>
  `;
  return card;
}

function renderAll() {
  const g1 = document.getElementById('grid-f1');
  const g2 = document.getElementById('grid-f2');
  g1.innerHTML = ''; g2.innerHTML = '';
  rooms.forEach(r => (r.floor === 1 ? g1 : g2).appendChild(renderRoom(r)));
  renderStats();
}

function renderStats() {
  [1,2].forEach(f => {
    const fr = rooms.filter(r => r.floor === f);
    const avail = fr.filter(r => r.type === 'green' && !r.fixedColor).length;
    const occ   = fr.filter(r => r.type === 'red').length;
    const clean = fr.filter(r => r.type === 'violet').length;
    document.getElementById(`stats-f${f}`).innerHTML = `
      <div class="stat-pill" style="background:var(--green-bg);border-color:var(--green);color:var(--green)">${avail} available</div>
      <div class="stat-pill" style="background:var(--red-bg);border-color:var(--red);color:var(--red)">${occ} occupied</div>
      ${clean > 0 ? `<div class="stat-pill" style="background:var(--violet-bg);border-color:var(--violet);color:var(--violet)">${clean} to clean</div>` : ''}
    `;
  });
}

// ── MODAL ──────────────────────────────────────────────

function openModal(id) {
  const r = rooms.find(x => x.id === id);
  if (!r) return;
  currentRoom = JSON.parse(JSON.stringify(r));

  document.getElementById('m-badge').style.background = colorBg(r.type);
  document.getElementById('m-badge').style.color = colorText(r.type);
  document.getElementById('m-badge').textContent = r.label;
  document.getElementById('m-title').textContent = `Room ${r.label}`;
  document.getElementById('m-subtitle').textContent = r.fixedType + (r.emergency ? ' — small room (sleeping only)' : '');

  // Status buttons
  const canStatus = r.canEdit.includes('status');
  document.getElementById('status-group').style.display = canStatus ? '' : 'none';
  if (canStatus) updateStatusButtons(r.type);

  // Restore owner button — always show for priest rooms that have an owner
  const showRestore = isPriestRoom(r) && r.owner;
  document.getElementById('restore-group').style.display = showRestore ? '' : 'none';
  if (showRestore) document.getElementById('restore-owner-name').textContent = r.owner;

  // Occupant
  document.getElementById('guest-group').style.display = r.canEdit.includes('guest') ? '' : 'none';
  document.getElementById('m-guest').value = r.occupant || '';

  // Dates
  document.getElementById('dates-group').style.display = r.canEdit.includes('dates') ? '' : 'none';
  document.getElementById('m-from').value = r.from || '';
  document.getElementById('m-to').value = r.to || '';

  document.getElementById('m-notes').value = r.notes || '';

  // Info note
  const infoEl = document.getElementById('m-info');
  let info = '';
  if (r.type === 'violet')
    info = '⚠️ This room needs cleaning. Once done, manually change the status back to "Available".';
  else if (r.type === 'green' && r.greenSince)
    info = `⏱ Timer active: ${daysLeft(r)} days remaining before it becomes "Needs cleaning".`;
  else if (r.fixedType === 'Seminarian' || r.fixedType === 'Student')
    info = 'Annual fixed room. Only the occupant name can be updated here.';
  else if (r.fixedType === 'Emergency')
    info = '🛏 Emergency room: sleeping only, no wardrobe.';
  infoEl.style.display = info ? '' : 'none';
  infoEl.textContent = info;

  document.getElementById('modal-overlay').classList.add('open');
}

function updateStatusButtons(type) {
  ['green','red','violet'].forEach(s =>
    document.getElementById(`btn-${s}`).classList.toggle('active', type === s)
  );
}

function setStatus(s) {
  if (!currentRoom) return;
  currentRoom.type = s;
  if (s === 'green') {
    currentRoom.greenSince = Date.now();
    currentRoom.occupant = ''; currentRoom.from = ''; currentRoom.to = '';
    document.getElementById('m-guest').value = '';
    document.getElementById('m-from').value = '';
    document.getElementById('m-to').value = '';
  } else if (s === 'red') {
    currentRoom.greenSince = null;
  } else if (s === 'violet') {
    currentRoom.greenSince = null;
    currentRoom.occupant = '';
    document.getElementById('m-guest').value = '';
  }
  updateStatusButtons(s);
  document.getElementById('m-badge').style.background = colorBg(s);
  document.getElementById('m-badge').style.color = colorText(s);
}

function restoreOwner() {
  if (!currentRoom || !currentRoom.owner) return;
  currentRoom.occupant = currentRoom.owner;
  currentRoom.from = ''; currentRoom.to = '';
  document.getElementById('m-guest').value = currentRoom.owner;
  document.getElementById('m-from').value = '';
  document.getElementById('m-to').value = '';
  // Save immediately
  const r = rooms.find(x => x.id === currentRoom.id);
  r.occupant = currentRoom.owner; r.from = ''; r.to = '';
  saveData(); renderAll();
  showToast(`↩ Restored to ${currentRoom.owner}`);
  closeModal();
}

function closeModal() {
  currentRoom = null;
  document.getElementById('modal-overlay').classList.remove('open');
}

function saveRoom() {
  if (!currentRoom) return;
  const r = rooms.find(x => x.id === currentRoom.id);
  if (!r) return;
  r.type = currentRoom.type;
  r.greenSince = currentRoom.greenSince;
  if (r.canEdit.includes('guest'))  r.occupant = document.getElementById('m-guest').value.trim();
  if (r.canEdit.includes('dates')) { r.from = document.getElementById('m-from').value; r.to = document.getElementById('m-to').value; }
  r.notes = document.getElementById('m-notes').value.trim();
  saveData(); renderAll(); closeModal();
  showToast(`Room ${r.label} updated ✓`);
}

// ── TOAST ──────────────────────────────────────────────

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// ── INIT ───────────────────────────────────────────────

document.getElementById('date-display').textContent =
  new Date().toLocaleDateString('en-GB', { weekday:'short', day:'numeric', month:'long', year:'numeric' });

document.getElementById('modal-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

checkTimers();
renderAll();
setInterval(checkTimers, 60 * 60 * 1000);
</script>
</body>
</html>
